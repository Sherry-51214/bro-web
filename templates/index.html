<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bro - Your AI Best Friend</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .chat-container {
            width: 800px;
            height: 90vh;
            background: #16213e;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .chat-header {
            background: linear-gradient(135deg, #0f3460, #533483);
            padding: 15px 20px;
            text-align: center;
            color: white;
        }
        .chat-header h1 { font-size: 24px; font-weight: 700; }
        .chat-header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }
        .upload-bar {
            background: #0a1628;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #533483;
        }
        .upload-bar span {
            color: #a78bfa;
            font-size: 13px;
        }
        #file-input { display: none; }
        #upload-btn {
            padding: 8px 16px;
            background: #533483;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }
        #upload-btn:hover { opacity: 0.85; }
        #upload-status {
            color: #a78bfa;
            font-size: 12px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .user-message {
            background: linear-gradient(135deg, #0f3460, #533483);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bro-message {
            background: #0f3460;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #533483;
        }
        .bro-label {
            font-size: 11px;
            color: #a78bfa;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .typing {
            display: none;
            align-self: flex-start;
            background: #0f3460;
            padding: 12px 18px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            border: 1px solid #533483;
            color: #a78bfa;
            font-size: 14px;
            margin: 0 20px;
        }
        .chat-input-area {
            padding: 20px;
            background: #0f3460;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #user-input {
            flex: 1;
            padding: 14px 20px;
            border-radius: 30px;
            border: 2px solid #533483;
            background: #1a1a2e;
            color: white;
            font-size: 15px;
            outline: none;
        }
        #user-input:focus { border-color: #a78bfa; }
        #user-input::placeholder { color: #666; }
        #send-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #533483, #a78bfa);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        #send-btn:hover { opacity: 0.85; }
        #clear-btn {
            padding: 14px 20px;
            background: transparent;
            color: #a78bfa;
            border: 2px solid #533483;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
        }
        #clear-btn:hover { background: #533483; color: white; }
        .welcome-message {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin: auto;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #533483; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 Bro</h1>
            <p>Your Personal AI Best Friend — Coding • Jobs • Business • Anything</p>
        </div>
        <div class="upload-bar">
            <span>📄 Feed Bro your documents:</span>
            <input type="file" id="file-input" accept=".pdf,.txt"/>
            <button id="upload-btn" onclick="document.getElementById('file-input').click()">
                Upload Resume / Notes 📎
            </button>
            <span id="upload-status"></span>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="welcome-message">
                <p>👋 Yooo Shehroz! Bro is ready to help you!</p>
                <p style="margin-top: 8px; font-size: 12px;">Upload your resume or notes above, then ask me anything! 😄</p>
            </div>
        </div>
        <div class="typing" id="typing">Bro is thinking... 🤔</div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Talk to Bro..." autocomplete="off"/>
            <button id="send-btn">Send 🚀</button>
            <button id="clear-btn">Clear 🗑️</button>
        </div>
    </div>
    <script>
        const messagesDiv = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');
        const typing = document.getElementById('typing');
        const fileInput = document.getElementById('file-input');
        const uploadStatus = document.getElementById('upload-status');

        function addMessage(text, isUser) {
            const welcomeMsg = document.querySelector('.welcome-message');
            if (welcomeMsg) welcomeMsg.remove();

            const wrapper = document.createElement('div');
            wrapper.style.display = 'flex';
            wrapper.style.flexDirection = 'column';
            wrapper.style.alignItems = isUser ? 'flex-end' : 'flex-start';

            if (!isUser) {
                const label = document.createElement('div');
                label.className = 'bro-label';
                label.textContent = '🤖 Bro';
                wrapper.appendChild(label);
            }

            const message = document.createElement('div');
            message.className = `message ${isUser ? 'user-message' : 'bro-message'}`;
            message.textContent = text;
            wrapper.appendChild(message);

            messagesDiv.appendChild(wrapper);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            userInput.value = '';
            sendBtn.disabled = true;
            typing.style.display = 'block';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await response.json();
                typing.style.display = 'none';
                addMessage(data.reply, false);
            } catch (error) {
                typing.style.display = 'none';
                addMessage('Bro had a brain fart 😅 Try again!', false);
            }

            sendBtn.disabled = false;
            userInput.focus();
        }

        fileInput.addEventListener('change', async () => {
            const file = fileInput.files[0];
            if (!file) return;

            uploadStatus.textContent = '⏳ Uploading...';
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.success) {
                    uploadStatus.textContent = '✅ ' + data.success;
                } else {
                    uploadStatus.textContent = '❌ ' + data.error;
                }
            } catch (error) {
                uploadStatus.textContent = '❌ Upload failed!';
            }
        });

        clearBtn.addEventListener('click', async () => {
            await fetch('/clear', { method: 'POST' });
            messagesDiv.innerHTML = `
                <div class="welcome-message">
                    <p>🧠 Memory cleared! Fresh start!</p>
                </div>`;
        });

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
